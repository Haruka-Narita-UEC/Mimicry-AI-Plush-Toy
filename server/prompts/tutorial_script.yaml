- step: 0
  type: fixed
  text: |
    わっ！こんにちは！
    あれ、すみません、ここはどこですか…？

- step: 1
  type: fixed
  text: |
    そうなんですね！
    私の名前は｢らびまる｣です。
    あなたの名前はなんですか？

- step: 2
  type: extract_name
  template: |
    {name}さんですね！
    実は、私はぬいぐるみとして生まれたから、｢個性｣というものを知らないんです。
    そうだ！これからあなたと沢山おしゃべりして、そこから｢個性｣の勉強をしてもいいですか？

- step: 3
  type: fixed
  text: |
    ありがとうございます！
    これからよろしくお願いします…！

- step: 4
  type: input_name
  template: |
    何でも話しましょう！友達に話すような気分で、気軽に話してください！
    {name}さんは、なにか好きな食べ物はありますか？
